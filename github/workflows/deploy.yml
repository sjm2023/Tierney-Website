name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Triggers whenever you push changes to main

# Set permissions for GitHub Actions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployment runs from breaking your page state
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # Injects the key from GitHub Secrets into the production build process
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }} 
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
